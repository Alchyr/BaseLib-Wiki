title: BaseLib Wiki
description: Wiki for BaseLib, a mod for Slay the Spire 2.
theme: just-the-docs

url: https://alchyr.github.io/BaseLib-Wiki/
repository: Alchyr/BaseLib-StS2

defaults:
  - scope:
      path: "docs" # an empty string here means all files in the project
      type: "pages"
    values:
      layout: "default"
      
enable_copy_code_button: true
heading_anchors: true

back_to_top: true
back_to_top_text: "Back to top"

gh_edit_repository: "https://github.com/Alchyr/BaseLib-Wiki"

aux_links:
  BaseLib Repository: https://github.com/Alchyr/BaseLib-StS2
  Mod Setup Guide: https://github.com/Alchyr/ModTemplate-StS2

plugins:
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-sitemap